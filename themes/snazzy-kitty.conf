# Snazzy color scheme for Kitty
# https://github.com/sindresorhus/iterm2-snazzy
#
# Usage: add to ~/.config/kitty/kitty.conf:
#   include ~/myshell-init/themes/snazzy-kitty.conf

background            #282a36
foreground            #eff0eb
selection_background  #41455a
selection_foreground  #eff0eb
cursor                #97979b
cursor_text_color     #282a36

# normal
color0   #282a36
color1   #ff5c57
color2   #5af78e
color3   #f3f99d
color4   #57c7ff
color5   #ff6ac1
color6   #9aedfe
color7   #f1f1f0

# bright
color8   #686868
color9   #ff5c57
color10  #5af78e
color11  #f3f99d
color12  #57c7ff
color13  #ff6ac1
color14  #9aedfe
color15  #eff0eb

font_family      MesloLGS NF
bold_font        MesloLGS NF Bold
italic_font      MesloLGS NF Italic
bold_italic_font MesloLGS NF Bold Italic
font_size        13.0
